[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# Keep CI lint lightweight and high-signal (avoid bikeshedding style rules).
select = ["F", "E9"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = false

